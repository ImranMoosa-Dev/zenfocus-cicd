name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t imranmoosa/static-site:latest .

      - name: Push Docker Image
        run: |
          docker push imranmoosa/static-site:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull imranmoosa/static-site:latest

            sudo docker stop website || true
            sudo docker rm website || true

            sudo docker run -d \
              --name website \
              -p 80:80 \
              imranmoosa/static-site:latest
